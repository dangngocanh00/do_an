<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhật ký hoạt động — Leader | TN Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #F0F4F4; color: #060D10; }
    .timeline-item { transition: background-color 0.15s ease; }
    .timeline-item:hover { background-color: #F8FAFC; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast-show { animation: toastIn 220ms ease-out; }
  </style>
</head>
<body class="bg-[#F0F4F4]">
  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Header dùng chung -->
  <header class="fixed top-0 left-60 right-0 h-16 bg-white border-b border-slate-200 z-20 flex items-center justify-between px-6 transition-all duration-300">
    <div class="flex items-center gap-2">
      <span class="text-xl font-bold text-[#21A691]">TN Manager</span>
    </div>
    <div class="flex items-center gap-2">
      <button type="button" class="relative p-2 rounded-full hover:bg-slate-100 transition" aria-label="Thông báo">
        <i data-lucide="bell" class="w-5 h-5 text-slate-600" stroke-width="1.5"></i>
        <span id="bell-badge" class="hidden absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] bg-[#EF4444] text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1">0</span>
      </button>
      <div id="header-user" class="flex items-center gap-2 px-2"></div>
      <button onclick="logout()" type="button"
        class="px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition flex items-center gap-1.5">
        <i data-lucide="log-out" class="w-4 h-4" stroke-width="1.5"></i>
        Đăng xuất
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="ml-60 pt-16 min-h-screen transition-all duration-300">
    <div class="max-w-screen-xl mx-auto px-6 py-6">

      <!-- 1. Page header -->
      <div class="flex items-start justify-between mb-6 gap-4">
        <div>
          <h1 class="text-2xl font-bold text-[#060D10]">Nhật ký hoạt động</h1>
          <p class="text-sm text-[#64748B] mt-1">Toàn bộ thao tác trong hệ thống</p>
        </div>
        <button onclick="exportReport()" type="button"
          class="bg-white border border-[#21A691] text-[#21A691] hover:bg-[#21A691]/5 font-medium px-4 py-2 rounded-lg flex items-center gap-2 transition flex-shrink-0">
          <i data-lucide="download" class="w-4 h-4" stroke-width="2"></i>
          Xuất báo cáo
        </button>
      </div>

      <!-- 2. Stats mini (4 thẻ) — số liệu mockup theo design spec -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: #060D101A; color: #060D10;">
            <i data-lucide="activity" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-[#060D10]">24</div>
            <div class="text-xs text-slate-500">Tổng thao tác hôm nay</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: #21A6911A; color: #21A691;">
            <i data-lucide="link" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-[#21A691]">8</div>
            <div class="text-xs text-slate-500">Gán tài nguyên</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: #EF44441A; color: #EF4444;">
            <i data-lucide="bell" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-[#EF4444]">3</div>
            <div class="text-xs text-slate-500">Cảnh báo phát sinh</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background-color: #27403E1A; color: #27403E;">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-[#27403E]">13</div>
            <div class="text-xs text-slate-500">Đồng bộ tự động</div>
          </div>
        </div>
      </div>

      <!-- 3. Toolbar -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4 flex flex-wrap items-center gap-3">
        <!-- Search -->
        <div class="relative flex-1 min-w-[220px] max-w-sm">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" stroke-width="1.5"></i>
          <input id="search-input" type="text"
            placeholder="Tìm theo tên người dùng, thao tác..."
            class="w-full pl-10 pr-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-[#21A691] focus:border-transparent outline-none transition" />
        </div>
        <!-- Loại thao tác -->
        <select id="filter-type"
          class="text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[#21A691] focus:border-transparent outline-none transition bg-white">
          <option value="all">Tất cả loại</option>
          <option value="gan_tai_nguyen">Gán tài nguyên</option>
          <option value="thu_hoi">Thu hồi</option>
          <option value="dong_bo">Đồng bộ</option>
          <option value="canh_bao">Cảnh báo</option>
          <option value="dang_nhap_via">Đăng nhập VIA</option>
        </select>
        <!-- Người thực hiện -->
        <select id="filter-person"
          class="text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[#21A691] focus:border-transparent outline-none transition bg-white">
          <option value="all">Tất cả người dùng</option>
          <option value="system">System</option>
          <option value="leader">Leader</option>
          <option value="nhansu">Nhân sự</option>
        </select>
        <!-- Date range -->
        <div class="flex items-center gap-2">
          <input id="date-from" type="date"
            class="text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[#21A691] focus:border-transparent outline-none transition bg-white" />
          <span class="text-xs text-slate-400">—</span>
          <input id="date-to" type="date"
            class="text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[#21A691] focus:border-transparent outline-none transition bg-white" />
        </div>
        <!-- Nút Lọc -->
        <button onclick="renderTimeline(true)" type="button"
          class="bg-[#21A691] hover:bg-[#1A8A78] text-white font-medium px-4 py-2 rounded-lg flex items-center gap-2 transition shadow-sm">
          <i data-lucide="filter" class="w-4 h-4" stroke-width="2"></i>
          Lọc
        </button>
      </div>

      <!-- 4. Timeline -->
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div id="timeline-container"></div>
        <!-- Phân trang -->
        <div id="pagination" class="mt-4"></div>
      </section>

    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-white border border-slate-200 shadow-lg rounded-lg px-4 py-3 z-[60] flex items-center gap-2">
    <i id="toast-icon" data-lucide="check-circle-2" class="w-5 h-5 text-[#21A691]"></i>
    <span id="toast-message" class="text-sm font-medium text-[#060D10]">—</span>
  </div>

  <!-- Scripts -->
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/data.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="../../assets/js/pagination.js"></script>

  <script>
    // 0. Bảo vệ + sidebar
    checkAuth('leader');
    renderSidebar('leader');

    // 1. Render header user
    (function renderHeaderUser() {
      const user = getCurrentUser();
      if (!user) return;
      document.getElementById('header-user').innerHTML = `
        <span class="text-sm font-medium text-slate-700 hidden sm:inline">${user.name}</span>
        <div class="w-9 h-9 rounded-full bg-[#21A691] text-white font-semibold flex items-center justify-center">
          ${user.name.charAt(0).toUpperCase()}
        </div>
      `;
      // Bell badge — số cảnh báo chưa xử lý (dynamic từ data.js)
      const count = CANH_BAO.filter((c) => c.trangThai === 'chua_xu_ly').length;
      const badge = document.getElementById('bell-badge');
      if (badge) {
        badge.textContent = count;
        badge.classList.toggle('hidden', count === 0);
      }
    })();

    // 2. Cấu hình màu + icon Lucide cho từng loại thao tác
    const LOAI_CONFIG = {
      gan_tai_nguyen:  { bg: '#21A691', icon: 'link',           label: 'Gán tài nguyên' },
      thu_hoi:         { bg: '#EF4444', icon: 'x-circle',       label: 'Thu hồi' },
      canh_bao:        { bg: '#F59E0B', icon: 'alert-triangle', label: 'Cảnh báo' },
      dong_bo:         { bg: '#27403E', icon: 'refresh-cw',     label: 'Đồng bộ' },
      dang_nhap_via:   { bg: '#3B82F6', icon: 'log-in',         label: 'Đăng nhập VIA' },
      xu_ly_canh_bao:  { bg: '#10B981', icon: 'check-circle-2', label: 'Xử lý cảnh báo' }
    };
    const DEFAULT_CFG = { bg: '#64748B', icon: 'circle', label: 'Khác' };

    // 3. Helpers
    function refreshIcons() {
      if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
    }

    // CLAUDE.md xác định "hôm nay" = 2026-05-10. Hardcode để khớp với mock data.
    const TODAY_STR = '2026-05-10';
    function shiftDate(dateStr, days) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }
    // Hiển thị ngày: "Hôm nay" / "Hôm qua" / DD/MM/YYYY
    function formatDayHeader(dateStr) {
      const [y, m, d] = dateStr.split('-');
      const formatted = `${d}/${m}/${y}`;
      if (dateStr === TODAY_STR) return `Hôm nay — ${formatted}`;
      if (dateStr === shiftDate(TODAY_STR, -1)) return `Hôm qua — ${formatted}`;
      return formatted;
    }
    // Tách HH:MM từ "2026-05-10 09:20"
    function getTimePart(dt) {
      const parts = dt.split(' ');
      return parts[1] || '';
    }
    function getDatePart(dt) {
      return dt.split(' ')[0];
    }

    // Phân loại role theo tên
    function nguoiRole(nguoi) {
      if (nguoi === 'System') return 'system';
      if (nguoi.includes('Leader')) return 'leader';
      return 'nhansu';
    }

    // 4. Set giá trị mặc định cho date range = 7 ngày gần nhất
    document.getElementById('date-from').value = shiftDate(TODAY_STR, -6);
    document.getElementById('date-to').value = TODAY_STR;

    // 5. State phân trang (dùng helper paginate/renderPagination từ pagination.js)
    const ITEMS_PER_PAGE = 10;
    let currentPage = 1;

    // 6. Render timeline với filter + phân trang
    const searchInput = document.getElementById('search-input');
    const typeFilter = document.getElementById('filter-type');
    const personFilter = document.getElementById('filter-person');
    const dateFrom = document.getElementById('date-from');
    const dateTo = document.getElementById('date-to');

    function getFilteredItems() {
      const search = searchInput.value.toLowerCase().trim();
      const type = typeFilter.value;
      const person = personFilter.value;
      const fromStr = dateFrom.value;
      const toStr = dateTo.value;

      return NHAT_KY.filter((nk) => {
        const matchSearch = !search
          || nk.nguoi.toLowerCase().includes(search)
          || nk.hanhDong.toLowerCase().includes(search);
        const matchType = type === 'all' || nk.loai === type;
        const matchPerson = person === 'all' || nguoiRole(nk.nguoi) === person;
        const dateOnly = getDatePart(nk.thoiGian);
        const matchDate = (!fromStr || dateOnly >= fromStr)
          && (!toStr || dateOnly <= toStr);
        return matchSearch && matchType && matchPerson && matchDate;
      });
    }

    function renderTimeline(resetPage = false) {
      if (resetPage) currentPage = 1;
      const filtered = getFilteredItems();

      // Sắp xếp giảm dần theo datetime
      filtered.sort((a, b) => b.thoiGian.localeCompare(a.thoiGian));

      // Phân trang qua helper dùng chung
      const pageInfo = paginate(filtered, currentPage, ITEMS_PER_PAGE);
      currentPage = pageInfo.currentPage;

      const container = document.getElementById('timeline-container');

      if (pageInfo.total === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-slate-400">
            <i data-lucide="inbox" class="w-10 h-10 text-slate-300 mx-auto mb-2"></i>
            <p class="text-sm">Không có hoạt động nào khớp bộ lọc</p>
          </div>`;
      } else {
        // Group theo ngày (giữ thứ tự desc của items)
        const groups = [];
        let currentDate = null;
        pageInfo.items.forEach((nk) => {
          const date = getDatePart(nk.thoiGian);
          if (date !== currentDate) {
            currentDate = date;
            groups.push({ date, items: [] });
          }
          groups[groups.length - 1].items.push(nk);
        });

        container.innerHTML = groups.map((g) => `
          <div class="mb-6 last:mb-0">
            <h3 class="text-sm font-semibold text-[#060D10] mb-3 flex items-center gap-2">
              <i data-lucide="calendar" class="w-4 h-4 text-slate-400" stroke-width="1.5"></i>
              ${formatDayHeader(g.date)}
            </h3>
            <div class="relative pl-1">
              <!-- Đường kẻ dọc nối các avatar -->
              <div class="absolute top-5 bottom-5 w-px bg-slate-200" style="left: 19px;"></div>
              <div class="space-y-1">
                ${g.items.map(renderTimelineItem).join('')}
              </div>
            </div>
          </div>
        `).join('');
      }

      // Pagination — click → đổi trang + scroll lên đầu timeline
      renderPagination('pagination', pageInfo, (newPage) => {
        currentPage = newPage;
        renderTimeline();
        document.getElementById('timeline-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      refreshIcons();
    }

    function renderTimelineItem(nk) {
      const cfg = LOAI_CONFIG[nk.loai] || DEFAULT_CFG;
      const initial = nk.nguoi.charAt(0).toUpperCase();
      return `
        <div class="timeline-item relative flex gap-3 -mx-2 px-2 py-2 rounded-lg">
          <!-- Avatar -->
          <div class="w-9 h-9 rounded-full text-white flex items-center justify-center font-semibold text-sm flex-shrink-0 z-10 shadow-sm" style="background-color: ${cfg.bg};">
            ${initial}
          </div>
          <!-- Nội dung -->
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <p class="text-sm leading-snug">
                  <i data-lucide="${cfg.icon}" class="inline w-3.5 h-3.5 mr-1 align-text-bottom" style="color: ${cfg.bg};"></i>
                  <span class="font-semibold text-[#060D10]">${nk.nguoi}</span>
                  <span class="text-slate-700">${nk.hanhDong}</span>
                </p>
                <div class="flex items-center gap-2 mt-1.5">
                  <span class="text-xs px-2 py-0.5 rounded font-mono" style="background-color: #F1F5F9; color: #475569;">${nk.doiTuong}</span>
                  <span class="text-xs px-2 py-0.5 rounded" style="background-color: ${cfg.bg}1A; color: ${cfg.bg};">${cfg.label}</span>
                </div>
              </div>
              <span class="text-xs text-slate-400 flex-shrink-0 mt-0.5 font-mono">${getTimePart(nk.thoiGian)}</span>
            </div>
          </div>
        </div>
      `;
    }

    // (Inline renderPagination/changePage cũ đã bị thay bằng helper từ pagination.js)

    // Filter real-time cho search/type/person; date range thì cần click "Lọc"
    searchInput.addEventListener('input', () => renderTimeline(true));
    typeFilter.addEventListener('change', () => renderTimeline(true));
    personFilter.addEventListener('change', () => renderTimeline(true));

    // Render lần đầu
    renderTimeline(true);

    // 7. Toast
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-message').textContent = message;
      const cfg = {
        success: { icon: 'check-circle-2', color: '#21A691' },
        warning: { icon: 'alert-triangle', color: '#F59E0B' },
        error:   { icon: 'x-circle',       color: '#EF4444' }
      }[type] || { icon: 'check-circle-2', color: '#21A691' };
      icon.setAttribute('data-lucide', cfg.icon);
      icon.style.color = cfg.color;
      toast.classList.remove('hidden');
      toast.classList.remove('toast-show');
      void toast.offsetWidth;
      toast.classList.add('toast-show');
      refreshIcons();
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // 8. Mock xuất báo cáo
    function exportReport() {
      showToast('Đang xuất báo cáo... (tính năng demo)', 'warning');
    }
  </script>
</body>
</html>
