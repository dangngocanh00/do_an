<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TN Manager — Đăng nhập</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Gradient tối: từ near-black sang xanh teal đậm */
    .bg-gradient-login {
      background: linear-gradient(135deg, #060D10 0%, #27403E 100%);
    }
    .btn-primary { background-color: #21A691; }
    .btn-primary:hover { background-color: #1A8A78; }
  </style>
</head>
<body class="bg-gradient-login min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <!-- Logo + tên hệ thống — đặt trên nền gradient tối nên chữ trắng -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#21A691] text-white text-3xl font-bold shadow-lg mb-4">
        TN
      </div>
      <h1 class="text-3xl font-bold text-white">TN Manager</h1>
      <p class="text-slate-300 mt-2">Hệ thống quản lý tài nguyên số</p>
    </div>

    <!-- Card login -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-[#060D10] mb-6">Đăng nhập tài khoản</h2>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="email@agency.com"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#21A691] focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#21A691] focus:border-transparent transition"
          />
        </div>

        <!-- Thông báo lỗi -->
        <div id="errorMsg" class="hidden text-sm text-[#EF4444] bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

        <button
          type="submit"
          class="btn-primary w-full text-white font-semibold py-2.5 rounded-lg transition shadow-sm"
        >
          Đăng nhập
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-300 mt-6">
      &copy; 2026 TN Manager — Đồ án tốt nghiệp
    </p>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    // Xử lý submit form
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      const result = login(email, password);
      if (result.success) {
        // Redirect theo role
        window.location.href = result.redirect;
      } else {
        errorMsg.textContent = result.message;
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
